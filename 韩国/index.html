<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韩国市场新闻</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
        h1 { text-align: center; font-size: 28px; font-weight: 700; margin-bottom: 8px; color: #f1f5f9; }
        .subtitle { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 36px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
        .card { display: flex; align-items: center; gap: 14px; background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 16px 18px; text-decoration: none; color: #e2e8f0; transition: all 0.2s; }
        .card:hover { background: #1a3a2a; border-color: #4ade80; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(74,222,128,0.15); }
        .icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .icon.kr { background: #1a3a2a; color: #4ade80; }
        .info { flex: 1; min-width: 0; }
        .name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .desc { font-size: 12px; color: #64748b; margin-top: 2px; }
        .arrow { color: #475569; font-size: 18px; flex-shrink: 0; }
        .card:hover .arrow { color: #4ade80; }
        footer { text-align: center; color: #475569; font-size: 12px; margin-top: 40px; padding-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>韩国市场 · 新闻</h1>
        <p class="subtitle">韩国热门板块与股票</p>
        <div class="grid">
            <a class="card" href="20260626_逼空后回调三星万亿投资计划.html">
                <div class="icon kr">调</div>
                <div class="info"><div class="name">逼空后回调 · 三星千亿投资计划</div><div class="desc">2026-06-26</div></div>
                <div class="arrow">›</div>
            </a>
            <a class="card" href="20260625_半导体领涨逼空行情.html">
                <div class="icon kr">涨</div>
                <div class="info"><div class="name">半导体逼空 · 续涨 +4.79%</div><div class="desc">2026-06-25</div></div>
                <div class="arrow">›</div>
            </a>
            <a class="card" href="20260624_强劲反弹热门股票.html">
                <div class="icon kr">涨</div>
                <div class="info"><div class="name">强势反弹 · 热门股票</div><div class="desc">2026-06-24</div></div>
                <div class="arrow">›</div>
            </a>
            <a class="card" href="20260623_上涨板块热门股票.html">
                <div class="icon kr">跌</div>
                <div class="info"><div class="name">下挫调整 · 热门股票</div><div class="desc">2026-06-23</div></div>
                <div class="arrow">›</div>
            </a>
            <a class="card" href="20260612_上涨板块热门股票.html">
                <div class="icon kr">涨</div>
                <div class="info"><div class="name">上涨板块热门股票</div><div class="desc">2026-06-12</div></div>
                <div class="arrow">›</div>
            </a>
        </div>
        <footer>韩国市场新闻</footer>
    </div>
</body>
</html>
